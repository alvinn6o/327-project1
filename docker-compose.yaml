# Task 2.2: Multi-container setup - one server, multiple clients

services:
  # TCP server - listens on port 5001 for client connections
  server:
    build:
      context: .               
      dockerfile: Dockerfile.server  # Use server-specific Dockerfile

  # Client 1 - connects to server via Docker network
  client1:
    image: python:3-slim
    depends_on:
      - server
    volumes:
      - .:/app # Mount project so client.py is available
    working_dir: /app
    command: python client.py
    environment:
      - SERVER_HOST=server # "server" = Docker service name

  # Client 2 - same as client1, demonstrates multiple clients
  client2:
    image: python:3-slim
    depends_on:
      - server
    volumes:
      - .:/app
    working_dir: /app
    command: python client.py
    environment:
      - SERVER_HOST=server
